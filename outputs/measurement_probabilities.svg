<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">Measurement probabilities for a Hadamard gate</title>
  <desc id="desc">Bar chart showing 50 percent probability for measuring zero and 50 percent probability for measuring one.</desc>
  <rect width="900" height="540" fill="#fbfaf7"/>
  <text x="450" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d2628">Measurement Probabilities - H Gate</text>
  <line x1="150" y1="420" x2="780" y2="420" stroke="#263234" stroke-width="3"/>
  <line x1="150" y1="120" x2="150" y2="420" stroke="#263234" stroke-width="3"/>
  <g stroke="#d8d4cd" stroke-width="1">
    <line x1="150" y1="360" x2="780" y2="360"/>
    <line x1="150" y1="300" x2="780" y2="300"/>
    <line x1="150" y1="240" x2="780" y2="240"/>
    <line x1="150" y1="180" x2="780" y2="180"/>
    <line x1="150" y1="120" x2="780" y2="120"/>
  </g>
  <text x="132" y="425" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#3b4648">0.0</text>
  <text x="132" y="365" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#3b4648">0.2</text>
  <text x="132" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#3b4648">0.4</text>
  <text x="132" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#3b4648">0.6</text>
  <text x="132" y="185" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#3b4648">0.8</text>
  <text x="132" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#3b4648">1.0</text>
  <rect x="260" y="270" width="150" height="150" rx="4" fill="#2f6f73"/>
  <rect x="520" y="270" width="150" height="150" rx="4" fill="#d96c4a"/>
  <text x="335" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2628">0.5000</text>
  <text x="595" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2628">0.5000</text>
  <text x="335" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#1d2628">|0&gt;</text>
  <text x="595" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#1d2628">|1&gt;</text>
  <text x="48" y="272" text-anchor="middle" transform="rotate(-90 48 272)" font-family="Arial, sans-serif" font-size="18" fill="#1d2628">Probability</text>
</svg>
