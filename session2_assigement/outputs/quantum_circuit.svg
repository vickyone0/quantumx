<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Quantum circuit for applying a Hadamard gate</title>
  <desc id="desc">One qubit circuit with a Hadamard gate applied to q0.</desc>
  <rect width="900" height="300" fill="#fbfaf7"/>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d2628">Quantum Circuit - H Gate</text>
  <text x="112" y="156" text-anchor="end" font-family="Arial, sans-serif" font-size="24" fill="#1d2628">q0</text>
  <line x1="140" y1="150" x2="760" y2="150" stroke="#263234" stroke-width="4" stroke-linecap="round"/>
  <rect x="365" y="100" width="110" height="100" rx="8" fill="#f7e6b5" stroke="#263234" stroke-width="4"/>
  <text x="420" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#1d2628">H</text>
  <circle cx="140" cy="150" r="7" fill="#263234"/>
  <circle cx="760" cy="150" r="7" fill="#263234"/>
  <text x="450" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#3b4648">Initial state |0&gt; is transformed to (|0&gt; + |1&gt;) / sqrt(2).</text>
</svg>
